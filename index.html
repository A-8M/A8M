<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Przerwa techniczna</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      text-align: center;
    }
    .top-banner {
      background-color: #ff4d4d; /* czerwone tło, żeby było widoczne */
      color: white;
      padding: 15px 0;
      font-size: 24px;
      font-weight: bold;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
    }
    .content {
      margin-top: 70px; /* żeby treść nie była pod napisem */
    }
  </style>
</head>
<body>

  <div class="top-banner">Przerwa techniczna do odwołania</div>

  <div class="content">
    <p>Strona będzie dostępna wkrótce. Dziękujemy za cierpliwość!</p>
  </div>

</body>
</html>
