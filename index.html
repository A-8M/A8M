<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Przerwa techniczna</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .top-banner {
      background: linear-gradient(90deg, #ff4d4d, #ff9999);
      color: white;
      padding: 20px 40px;
      font-size: 28px;
      font-weight: bold;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .message {
      margin-top: 30px;
      font-size: 20px;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="top-banner">🛠️ Przerwa techniczna do odwołania 🛠️</div>
  <div class="message">
    Strona będzie dostępna wkrótce. Dziękujemy za cierpliwość!
  </div>

</body>
</html>
